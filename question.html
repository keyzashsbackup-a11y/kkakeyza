<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<body class="page-question">

  <!--bg-->
  <div class="page-wrapper fade-in">

    <div class="page-header">
      <!--tombol kembali-->

      <h1 class="page-title">💬 Question</h1>
      <p class="page-subtitle">Make Your Special Person Happy ♥</p>

    <!--chatarea===== -->
    <div class="chat-box" id="chatBox">

      <div class="chat-bubble bot">

        <div class="bubble-text">

      </div>

    </div>

    <!--input pesan-->

      <input
        type="text"
        id="userInput"
        class="chat-input"
        placeholder="Ketik pertanyaan atau curhatanmu di sini..."
      />
      <!--tombol kirim -->
      <button class="btn-send" onclick="sendMessage()">Kirim ➤</button>
